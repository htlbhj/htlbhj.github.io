# Site settings
title: "Jie Hu"
name: "Jie Hu"
position: "Associate Professor"
description: "My research interests include biostatistics, Bayesian inference and statistical computing."
email: "hujiechelsea@xmu.edu.cn"
affiliation: "Xiamen University"
github: "htlbhj"
google_scholar: "https://scholar.google.co.kr/citations?user=kFS6lBEAAAAJ&hl=en"
url: "https://htlbhj.github.io"
baseurl: ""  # keep empty for user page

# Keep the rest of the template settings intact to avoid 404
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/
timezone: Asia/Shanghai

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-scholar
  - jekyll-seo-tag

collections:
  publications:
    output: true
    permalink: /publication/:path/
  talks:
    output: true
    permalink: /talk/:path/
  teaching:
    output: true
    permalink: /teaching/:path/
  portfolio:
    output: true
    permalink: /portfolio/:path/

defaults:
  - scope:
      path: ""
      type: publications
    values:
      layout: publication
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
  - scope:
      path: ""
      type: teaching
    values:
      layout: teaching
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single

scholar:
  style: apa
  locale: en

exclude:
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock
  - README.md
